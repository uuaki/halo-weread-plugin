# Refer https://docs.halo.run/developer-guide/plugin/basics/manifest

apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  # The name defines how the plugin is invoked, A unique name
  name: halo-weread-plugin
spec:
  enabled: true
  requires: ">=2.23.0"
  author:
    name: haike
    website: https://prunuskee.com/
  logo: logo.png
  homepage: https://github.com/uuaki/halo-weread-plugin#readme
  repo: https://github.com/uuaki/halo-weread-plugin
  issues: https://github.com/uuaki/halo-weread-plugin/issues
  displayName: "微信读书（WeRead）信息展示"
  description: "在 Halo 博客中展示微信读书书架、阅读进度和读书笔记并自动同步"
  license:
    - name: "MIT"
      url: "https://github.com/uuaki/halo-weread-plugin/blob/main/LICENSE"
